version: '3.8'

services:
  # Nginx (Reverse Proxy)
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ft_transcendence_nginx
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend
      - redis
    networks:
      - transcendence_network

  # Redis (In-memory data store)
  redis:
    build:
      context: ./redis
      dockerfile: Dockerfile
    container_name: ft_transcendence_redis
    env_file:
      - .env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose:
      - "6379"
    networks:
      - transcendence_network

  # Backend (Django)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ft_transcendence_backend
    env_file:
      - .env
    environment:
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_SSLMODE: ${DB_SSLMODE}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    expose:
      - "8000"
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    networks:
      - transcendence_network
    command: daphne -b ${BACKEND_HOST} -p ${BACKEND_PORT} project_config.asgi:application

  # Frontend (React Dev Server with Hot Reload)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ft_transcendence_frontend
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=1
      - WATCHPACK_POLLING=1
      - REACT_APP_API_URL=${REACT_APP_API_URL}
    expose:
      - "3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - transcendence_network

networks:
  transcendence_network:
    driver: bridge
