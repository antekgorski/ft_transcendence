version: '3.8'

services:
  nginx:
    image: ${DOCKER_HUB_USER}/ft_transcendence_nginx:latest
    container_name: ft_transcendence_nginx
    restart: always
    ports:
      - "1234:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - redis
    networks:
      - transcendence_network

  redis:
    image: ${DOCKER_HUB_USER}/ft_transcendence_redis:latest
    container_name: ft_transcendence_redis
    restart: always
    env_file:
      - prod.env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - transcendence_network

  backend:
    image: ${DOCKER_HUB_USER}/ft_transcendence_backend:latest
    container_name: ft_transcendence_backend
    restart: always
    env_file:
      - prod.env
    environment:
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${HOST}
      CORS_ALLOWED_ORIGINS: https://${HOST},http://${HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_SSLMODE: ${DB_SSLMODE}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    expose:
      - "8000"
    volumes:
      - media_volume:/app/media
    depends_on:
      - redis
    networks:
      - transcendence_network
    command: daphne -b 0.0.0.0 -p 8000 project_config.asgi:application

  frontend:
    image: ${DOCKER_HUB_USER}/ft_transcendence_frontend:latest
    container_name: ft_transcendence_frontend
    restart: always
    env_file:
      - prod.env
    environment:
      # Override HOST from prod.env to prevent Create React App from trying to bind to the domain name
      HOST: "0.0.0.0"
      DANGEROUSLY_DISABLE_HOST_CHECK: "true"
    expose:
      - "3000"
    networks:
      - transcendence_network

networks:
  transcendence_network:
    driver: bridge

volumes:
  media_volume:
