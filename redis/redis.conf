# Redis configuration file

# Accept connections from any IP
bind 0.0.0.0

# Disable protected mode to allow external connections (on the private Docker network)
protected-mode no

# Default port
port 6379

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (Optional but recommended for some game state)
# Save the DB on disk if:
# - 900 sec (15 min) if at least 1 key changed
# - 300 sec (5 min) if at least 10 keys changed
# - 60 sec if at least 10000 keys changed
save 900 1
save 300 10
save 60 10000
